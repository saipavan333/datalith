# Optional "production-faithful" infra. The pipeline runs WITHOUT this (DuckDB + file stream),
# but spin these up to swap the stand-ins for the real services.
services:
  # Greenplum stand-in (Postgres; dbt-postgres profile works against Greenplum too)
  greenplum:
    image: postgres:16
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: gp
      POSTGRES_PASSWORD: gp
    ports: ["5432:5432"]

  # Kafka (the real transaction stream) — replace the file source in streaming_fraud.py
  kafka:
    image: bitnami/kafka:latest
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"

  # MinIO (S3/GCS-compatible object storage for the landing zone + lakehouse)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
