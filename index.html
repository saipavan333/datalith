  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">Data<span class="brand-accent">lith</span></span>
    </div>
    <div class="topbar-search">

    </div>
    <div class="topbar-actions">

  <div class="drawer-scrim" id="ai-scrim"></div>
  <aside class="drawer" id="ai-drawer" aria-hidden="true">
    <div class="drawer-head">
      <h3>✦ AI Mentor</h3>
      <button class="btn icon" id="ai-close">✕</button>
    </div>
    <div class="ai-messages" id="ai-messages"></div>
    <form class="ai-input" id="ai-form">
      <input id="ai-question" type="text" placeholder="Ask anything — e.g. 'Explain a JOIN like I'm 10'…" />
      <button class="btn primary" type="submit">Send</button>
    </form>
  </aside>
