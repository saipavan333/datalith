  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">DataForge<span class="brand-accent"> Academy</span></span>
    </div>
    <div class="topbar-search">
      <input id="search" type="search" placeholder="Search lessons…" autocomplete="off" />
    </div>
    <div class="topbar-actions">
      <div class="progress-pill" title="Your overall progress">
        <div class="progress-ring"><span id="progress-pct">0%</span></div>

  </div>

  <!-- AI assistant drawer -->
  <div class="drawer-scrim" id="ai-scrim"></div>
  <aside class="drawer" id="ai-drawer" aria-hidden="true">
    <div class="drawer-head">
      <h3>✦ AI Mentor</h3>
      <button class="btn icon" id="ai-close">✕</button>
    </div>
    <div class="ai-messages" id="ai-messages"></div>
    <form class="ai-input" id="ai-form">
      <input id="ai-question" type="text" placeholder="Ask anything — e.g. 'Explain a JOIN like I'm 10'…" />
      <button class="btn primary" type="submit">Send</button>
    </form>
  </aside>
